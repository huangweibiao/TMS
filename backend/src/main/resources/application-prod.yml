spring:
  datasource:
    url: jdbc:mysql://localhost:3306/tms_db?createDatabaseIfNotExist=true&useSSL=true&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:tms_user}
    password: ${DB_PASSWORD:tms_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update

logging:
  level:
    com.tms: INFO
    org.springframework: WARN
  file:
    name: logs/tms.log
